report_comment: >
  This report has been generated by the <a href="https://github.com/nf-cmgg/report/releases/tag/v1.0.0dev" target="_blank">nf-cmgg/report</a> analysis pipeline.

report_section_order:
  "nf-cmgg-report-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-cmgg-report-summary":
    order: -1002

# Export plots for better reproducibility
export_plots: true
export_plots_flatters: true

# Disable auto version detection to use pipeline versions
disable_version_detection: true

# Use custom CMGG template
template: "cmgg"

# Customize plot configurations
custom_plot_config:
  targeted_MSH2:
    defaultsort:
      - column: "MSH2_c.942+3A>T"
        direction: desc
      - column: "MSH2_c.942+2T>A"
        direction: desc
      - column: "MSH2_c.942+2T>G"
        direction: desc
      - column: "MSH2_c.942+2T>C"
        direction: desc

# Assigning modules to run (customize based on your data types)
run_modules:
  - targeted_MSH2

# Set report title and description
title: "nf-cmgg/report - Multi-workflow Analysis Report"
# General report options
max_table_rows: 500
table_cond_formatting_rules:
  pass:
    - s_eq: "PASS"
  fail:
    - s_eq: "FAIL"
  warn:
    - s_eq: "WARN"

# Disable warnings for missing samples
quiet: false
