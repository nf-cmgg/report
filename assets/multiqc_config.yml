report_comment: >
  This report has been generated by the <a href="https://github.com/nf-cmgg/report/releases/tag/v1.0.0dev" target="_blank">nf-cmgg/report</a> analysis pipeline.
report_section_order:
  "nf-cmgg-report-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-cmgg-report-summary":
    order: -1002

export_plots: true

disable_version_detection: true

template: "cmgg"

custom_plot_config:
  targeted_MSH2:
    defaultsort:
      - column: "MSH2_c.942+3A>T"
        direction: desc
      - column: "MSH2_c.942+2T>A"
        direction: desc
      - column: "MSH2_c.942+2T>G"
        direction: desc
      - column: "MSH2_c.942+2T>C"
        direction: desc

# Assigning modules to run
run_modules:
  - targeted_MSH2
