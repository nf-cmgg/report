report_comment: >
  This report has been generated by the <a href="https://github.com/nf-cmgg/smallvariants" target="_blank">nf-cmgg/smallvariants</a>
  analysis pipeline.
report_section_order:
  "nf-cmgg-smallvariants-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-cmgg-smallvariants-summary":
    order: -1002

export_plots: true

disable_version_detection: true

extra_fn_clean_exts:
  - type: regex_keep
    pattern: "^[^\\.]*"
    module: bcftools

MSH2_hotspot_varcount_config:
  sanger_threshold : 20

template: "cmgg"

custom_plot_config:
  general_stats_table:
    defaultsort:
      - column: 20_x_pc
        direction: asc
    no_violin: True
  MSH2_hotspot_varcount:
    defaultsort:
      - column: "MSH2_c.942+3A>T"
        direction: desc
      - column: "MSH2_c.942+2T>A"
        direction: desc
      - column: "MSH2_c.942+2T>C"
        direction: desc
      - column: "MSH2_c.942+2T>G"
        direction: desc
      

mosdepth_config:
  general_stats_coverage: [20,30]
  general_stats_coverage_hidden: [30]